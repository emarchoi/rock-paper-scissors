<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

  <!-- PLAYER SETUP -->
  <div class="container-setup">

    <div class="player-bg">
      <h1>ROCK PAPER SCISSORS</h1>
    </div>

    <!-- Player Setup -->
    <section class="player-setup">

      <div class="player-inputs">
        <div>
          <label for="player1">PLAYER 1</label>
          <input type="text" id="player1" placeholder="PLAYER NAME 1"/>
        </div>

        <div>
          <label for="player2">PLAYER 2</label>
          <input type="text" id="player2" placeholder="PLAYER NAME 2"/>
        </div>
      </div>

      <div class="score-input">
        <label for="max-score">SCORE UP TO</label>
        <input type="number" id="max-score" placeholder="1-10" min="1" max="10" value="">
      </div>

      <button id="start-game">START GAME</button>
    </section>
  </div>

  <!-- MAIN GAME -->
  <div class="container-main">
    <!-- Scoreboard -->
    <section class="scoreboard">
      <div class="player-bg">
        <h3>SCOREBOARD</h3>
      </div>

      <div class="scores">
        <div class="player-score">
          <h3 id="player1-name">PLAYER 1</h3>
          <p id="player1-score">0</p>
        </div>

        <div class="player-score">
          <h3 id="player2-name">PLAYER 1</h3>
          <p id="player2-score">0</p>
        </div>
      </div>
    </section>

    <!-- Current Turn -->
    <section class="turn-indicator">
      <div class="player-bg">
        <h3>CURRENT TURN</h3>
      </div>
      <p id="current-turn">PLAYER</p>
    </section>

    <!-- Choices -->
    <section class="choices">
      <div class="player-bg">
        <h3>CHOICES</h3>
      </div>
      <div class="button-group">
        <button id="rock"><i class="fa-solid fa-hand-back-fist"></i></button>
        <button id="paper"><i class="fa-solid fa-hand"></i></button>
        <button id="scissors"><i class="fa-solid fa-hand-scissors"></i></button>
      </div>
    </section>

    <!-- Round Result -->
    <section class="result">
      <div class="player-bg">
        <h3>RESULT</h3>
      </div>
      <p id="result-text">-</p>

      <button>RESET</button>
    </section>
  </div>


  <script src="script.js"></script>
</body>

</html>
